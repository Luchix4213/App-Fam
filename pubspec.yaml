name: fam_intento1
description: "Proyecto fam_intento1."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path: ^1.8.3
  http: ^1.3.0
  http_parser: ^4.1.2  # Null-safe version
  mime: ^2.0.0         # Null-safe version
  shared_preferences: ^2.3.2
  image_picker: ^1.1.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: 6.2.1
  flutter_secure_storage: ^10.0.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.0.0
  carousel_slider: ^5.1.2
  font_awesome_flutter: ^10.9.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:                      # 👈 configuración del ícono
  android: true
  ios: true
  image_path: "assets/icon/icon.png"  # ruta de tu ícono personalizado
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/ministros.json



